<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dantist1999 Hero</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="dantist-hero-page">
    <main>
      <section class="dantist-hero" aria-labelledby="dantist-hero-title">
        <div class="dantist-hero__container">
          <div class="dantist-hero__content">
            <div class="dantist-hero__initial">
              <div class="dantist-hero__heading">
                <h1 id="dantist-hero-title">Записаться по&nbsp;телефону</h1>
                <p>Современное лечение зубов для&nbsp;взрослых и&nbsp;детей. Оставьте заявку&nbsp;&mdash; мы&nbsp;свяжемся с&nbsp;вами.</p>
              </div>

              <form class="dantist-hero__form" novalidate>
                <div class="dantist-hero__fields">
                  <label class="dantist-hero__field">
                    <span>Имя</span>
                    <input type="text" name="name" autocomplete="name" aria-label="Имя" />
                  </label>

                  <label class="dantist-hero__field">
                    <span>Телефон</span>
                    <input type="tel" name="phone" autocomplete="tel" inputmode="tel" pattern="[0-9+\s()\-]*" value="+7 ___ ___-__-__" aria-label="Телефон" />
                  </label>
                </div>

                <label class="dantist-hero__consent">
                  <input type="checkbox" name="consent" />
                  <span class="dantist-hero__checkbox" aria-hidden="true">
                    <svg width="16" height="16" viewBox="0 0 16 16" focusable="false">
                      <path
                        fill-rule="evenodd"
                        clip-rule="evenodd"
                        d="M12.6876 3.92773C13.0103 3.92797 13.203 4.30155 12.9962 4.5625L7.27353 11.8164L7.27255 11.8174C7.00172 12.1571 6.48351 12.1586 6.21298 11.8164L3.00302 7.75C2.79967 7.49209 2.98396 7.11245 3.31259 7.1123H4.13193C4.23378 7.11248 4.33524 7.13614 4.42685 7.18066C4.51833 7.22523 4.59923 7.29017 4.6622 7.37012L6.74228 10.0068L11.339 4.18457C11.4667 4.02126 11.6626 3.92785 11.8683 3.92773H12.6876Z"
                      />
                    </svg>
                  </span>
                  <span class="dantist-hero__consent-text">
                    Даю согласие на&nbsp;<a href="#" aria-label="Открыть условия обработки персональных данных">обработку моих персональных данных</a>, включая имя и&nbsp;телефона для&nbsp;оформления обратного звонка
                  </span>
                </label>

                <div class="dantist-hero__actions">
                  <button class="dantist-hero__submit" type="submit"><span>Отправить заявку</span></button>
                  <a class="dantist-hero__submit dantist-hero__phone-button" href="tel:+73513927997"><span>8 (35139) 2-79-97</span></a>
                </div>
                <p class="dantist-hero__message" aria-live="polite"></p>
              </form>
            </div>

            <div class="dantist-hero__success" aria-hidden="true">
              <div class="dantist-hero__success-icon" aria-hidden="true">
                <svg width="128" height="128" viewBox="0 0 128 128" focusable="false">
                  <path
                    d="M50.0799 114.363C48.6482 117.206 44.6126 117.366 42.9461 114.654C31.746 96.4297 19.0685 79.1955 6.38702 61.9743C5.20936 60.3751 5.38662 58.1535 6.80278 56.7611L8.97876 54.6215C10.3904 53.2335 12.6061 53.0896 14.1854 54.2834L38.8062 72.8945C40.4431 74.1318 42.7525 73.9243 44.15 72.422C67.2185 47.6233 83.1899 32.6851 116.23 12.4969C116.757 12.1749 117.372 12 117.989 12C121.085 12 122.559 15.8504 120.298 17.9644C88.2432 47.9318 68.6898 77.4119 50.0799 114.363Z"
                    fill="url(#dantist-success-gradient)"
                  />
                  <defs>
                    <linearGradient id="dantist-success-gradient" x1="63.5009" y1="12" x2="63.5009" y2="116.595" gradientUnits="userSpaceOnUse">
                      <stop stop-color="var(--hero-green-light)" />
                      <stop offset="1" stop-color="var(--hero-green)" />
                    </linearGradient>
                  </defs>
                </svg>
              </div>
              <div class="dantist-hero__success-body">
                <div class="dantist-hero__success-text">
                  <h2>Заявка отправлена</h2>
                  <p>
                    Спасибо! Мы&nbsp;получили ваше обращение.<br />
                    Наш&nbsp;менеджер свяжется с&nbsp;вами в&nbsp;течение часа по&nbsp;номеру <strong data-success-phone>номер из&nbsp;формы</strong>.
                  </p>
                </div>
                <button class="dantist-hero__submit dantist-hero__success-button" type="button"><span>Хорошо!</span></button>
              </div>
            </div>
          </div>

          <div class="dantist-hero__image" aria-hidden="true">
            <img class="dantist-hero__layer dantist-hero__layer--3" src="assets/layer-3.webp" alt="" />
            <img class="dantist-hero__layer dantist-hero__layer--2" src="assets/layer-2.webp" alt="" />
            <img class="dantist-hero__layer dantist-hero__layer--1" src="assets/layer-1.webp" alt="" />
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
